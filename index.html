<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Dispositivos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --surface2: #1e2334;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --text: #e8eaf0;
            --muted: #7a8099;
            --accent: #4f8ef7;
            --accent-dim: rgba(79, 142, 247, 0.12);
            --accent-border: rgba(79, 142, 247, 0.35);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.1);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.1);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.1);
            --radius: 10px;
            --font: 'Sora', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .status-badge {
            font-size: 11px;
            font-family: var(--mono);
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.25);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.online {
            background: var(--green-dim);
            color: var(--green);
            border-color: rgba(52, 211, 153, 0.25);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.online .status-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        #config-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        #config-panel h2 {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        label {
            font-size: 12px;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
            font-family: var(--mono);
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent-border);
        }

        input::placeholder {
            color: var(--muted);
        }

        button {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .btn-ghost:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .btn-danger {
            background: var(--red-dim);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--red);
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
        }

        .count-badge {
            font-size: 12px;
            font-family: var(--mono);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-size: 12px;
            font-family: var(--mono);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--accent-border);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            padding-left: 36px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .device-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: border-color 0.15s;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .device-card:hover {
            border-color: var(--border-hover);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 10px;
        }

        .device-type-badge {
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .type-dvr {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent-border);
        }

        .type-facial {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .device-name {
            font-size: 15px;
            font-weight: 600;
            margin: 8px 0 3px;
        }

        .device-location {
            font-size: 12px;
            color: var(--muted);
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .info-grid {
            display: grid;
            gap: 8px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 12px;
        }

        .info-label {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .info-value {
            font-size: 13px;
            font-family: var(--mono);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn,
        .eye-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 13px;
            border-radius: 4px;
            transition: color 0.1s;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        .eye-btn:hover {
            color: var(--text);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 13px;
            font-family: var(--mono);
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: none;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 14px;
            gap: 10px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:640px) {
            main {
                padding: 1rem
            }

            .config-row {
                grid-template-columns: 1fr
            }

            .devices-grid {
                grid-template-columns: 1fr
            }

            .form-row {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon">🔐</div>
            Gerenciador de Dispositivos
        </div>
        <div id="conn-status" class="status-badge">
            <div class="status-dot"></div>
            <span id="conn-label">Desconectado</span>
        </div>
    </header>

    <main>
        <div id="config-panel">
            <h2>Configuração do Supabase</h2>
            <div class="config-row">
                <div>
                    <label>SUPABASE URL</label>
                    <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co">
                </div>
                <div>
                    <label>ANON KEY</label>
                    <input type="password" id="sb-key" placeholder="eyJhbGci...">
                </div>
                <button class="btn-primary" id="btn-conectar">Conectar</button>
            </div>
        </div>

        <div id="main-content" style="display:none">
            <div class="section-header">
                <div style="display:flex;align-items:center">
                    <span class="section-title">Dispositivos</span>
                    <span class="count-badge" id="count-badge">0</span>
                </div>
                <button class="btn-primary" id="btn-novo">+ Novo Dispositivo</button>
            </div>
            <div class="filters">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search" placeholder="Buscar por nome ou local...">
                </div>
                <button class="filter-btn active" data-filtro="todos">Todos</button>
                <button class="filter-btn" data-filtro="DVR">DVR</button>
                <button class="filter-btn" data-filtro="Leitor Facial">Leitor Facial</button>
            </div>
            <div id="devices-container">
                <div class="loading">
                    <div class="spinner"></div> Carregando...
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title" id="modal-title">Novo Dispositivo</div>
            <input type="hidden" id="edit-id">
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="f-tipo">
                        <option value="DVR">DVR</option>
                        <option value="Leitor Facial">Leitor Facial</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nome / Identificação</label>
                    <input type="text" id="f-nome" placeholder="Ex: DVR Entrada Principal">
                </div>
                <div class="form-group full">
                    <label>Localização</label>
                    <input type="text" id="f-local" placeholder="Ex: Recepção, 2º Andar...">
                </div>
                <div class="form-group">
                    <label>IP do Dispositivo</label>
                    <input type="text" id="f-ip" placeholder="192.168.1.100">
                </div>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="f-usuario" placeholder="admin">
                </div>
                <div class="form-group full">
                    <label>Senha</label>
                    <input type="text" id="f-senha" placeholder="••••••••">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" id="btn-cancelar">Cancelar</button>
                <button class="btn-primary" id="btn-salvar">Salvar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function () {
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
            script.onload = init;
            script.onerror = function () {
                showToast('Falha ao carregar Supabase. Verifique sua internet.', 'error');
            };
            document.head.appendChild(script);

            var client = null;
            var dispositivos = [];
            var filtroAtual = 'todos';
            var senhasVisiveis = {};

            function init() {
                document.getElementById('btn-conectar').addEventListener('click', conectar);
                document.getElementById('btn-novo').addEventListener('click', function () { abrirModal(); });
                document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
                document.getElementById('btn-salvar').addEventListener('click', salvar);
                document.getElementById('search').addEventListener('input', renderizar);
                document.getElementById('modal').addEventListener('click', function (e) { if (e.target === this) fecharModal(); });
                document.querySelectorAll('.filter-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        filtroAtual = this.dataset.filtro;
                        document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
                        this.classList.add('active');
                        renderizar();
                    });
                });
            }

            function conectar() {
                var url = document.getElementById('sb-url').value.trim();
                var key = document.getElementById('sb-key').value.trim();
                if (!url || !key) return showToast('Preencha URL e Anon Key!', 'error');
                client = window.supabase.createClient(url, key);
                carregarDispositivos();
            }

            async function carregarDispositivos() {
                var btn = document.getElementById('btn-conectar');
                btn.disabled = true;
                btn.textContent = 'Conectando...';

                var result = await client.from('dispositivos').select('*').order('created_at', { ascending: false });

                btn.disabled = false;
                btn.textContent = 'Conectar';

                if (result.error) {
                    showToast('Erro: ' + result.error.message, 'error');
                    setStatus(false);
                    return;
                }

                setStatus(true);
                document.getElementById('main-content').style.display = 'block';
                dispositivos = result.data || [];
                renderizar();
            }

            function setStatus(online) {
                var el = document.getElementById('conn-status');
                var label = document.getElementById('conn-label');
                el.className = 'status-badge' + (online ? ' online' : '');
                label.textContent = online ? 'Conectado' : 'Desconectado';
            }

            function renderizar() {
                var busca = document.getElementById('search').value.toLowerCase();
                var filtrados = dispositivos.filter(function (d) {
                    var matchTipo = filtroAtual === 'todos' || d.tipo === filtroAtual;
                    var matchBusca = !busca ||
                        (d.nome || '').toLowerCase().includes(busca) ||
                        (d.localizacao || '').toLowerCase().includes(busca) ||
                        (d.ip || '').includes(busca);
                    return matchTipo && matchBusca;
                });

                document.getElementById('count-badge').textContent = filtrados.length;
                var container = document.getElementById('devices-container');

                if (!filtrados.length) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum dispositivo encontrado.</p></div>';
                    return;
                }

                container.innerHTML = '<div class="devices-grid">' + filtrados.map(cardHTML).join('') + '</div>';

                container.querySelectorAll('[data-action]').forEach(function (el) {
                    el.addEventListener('click', function () {
                        var action = this.dataset.action;
                        var id = this.dataset.id;
                        var val = this.dataset.val;
                        if (action === 'editar') editarDispositivo(id);
                        if (action === 'excluir') excluir(id);
                        if (action === 'copiar') copiar(val);
                        if (action === 'toggle-senha') toggleSenha(id);
                    });
                });
            }

            function cardHTML(d) {
                var visivel = senhasVisiveis[d.id];
                var senhaTexto = visivel ? (d.senha || '—') : '••••••••';
                var badgeClass = d.tipo === 'DVR' ? 'type-dvr' : 'type-facial';
                return '<div class="device-card">' +
                    '<div class="card-header">' +
                    '<div>' +
                    '<span class="device-type-badge ' + badgeClass + '">' + d.tipo + '</span>' +
                    '<div class="device-name">' + (d.nome || '') + '</div>' +
                    '<div class="device-location">📍 ' + (d.localizacao || '—') + '</div>' +
                    '</div>' +
                    '<div class="card-actions">' +
                    '<button class="btn-ghost btn-sm" data-action="editar" data-id="' + d.id + '">✏</button>' +
                    '<button class="btn-danger" data-action="excluir" data-id="' + d.id + '">🗑</button>' +
                    '</div>' +
                    '</div>' +
                    '<div class="info-grid">' +
                    infoRow('IP', d.ip, d.ip) +
                    infoRow('Usuário', d.usuario, d.usuario) +
                    '<div class="info-row">' +
                    '<span class="info-label">Senha</span>' +
                    '<span class="info-value">' +
                    '<span id="senha-txt-' + d.id + '">' + senhaTexto + '</span>' +
                    '<button class="eye-btn" data-action="toggle-senha" data-id="' + d.id + '">' + (visivel ? '🙈' : '👁') + '</button>' +
                    (d.senha ? '<button class="copy-btn" data-action="copiar" data-val="' + escAttr(d.senha) + '">⎘</button>' : '') +
                    '</span>' +
                    '</div>' +
                    '</div>' +
                    '</div>';
            }

            function infoRow(label, valor, copyVal) {
                return '<div class="info-row">' +
                    '<span class="info-label">' + label + '</span>' +
                    '<span class="info-value">' +
                    (valor || '—') +
                    (copyVal ? '<button class="copy-btn" data-action="copiar" data-val="' + escAttr(copyVal) + '">⎘</button>' : '') +
                    '</span>' +
                    '</div>';
            }

            function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

            function toggleSenha(id) {
                senhasVisiveis[id] = !senhasVisiveis[id];
                var d = dispositivos.find(function (x) { return x.id == id; });
                var el = document.getElementById('senha-txt-' + id);
                if (el && d) el.textContent = senhasVisiveis[id] ? (d.senha || '—') : '••••••••';
                var btn = document.querySelector('[data-action="toggle-senha"][data-id="' + id + '"]');
                if (btn) btn.textContent = senhasVisiveis[id] ? '🙈' : '👁';
            }

            function copiar(texto) {
                navigator.clipboard.writeText(texto).then(function () { showToast('Copiado!'); });
            }

            function abrirModal(d) {
                document.getElementById('edit-id').value = d ? d.id : '';
                document.getElementById('f-tipo').value = d ? d.tipo : 'DVR';
                document.getElementById('f-nome').value = d ? d.nome : '';
                document.getElementById('f-local').value = d ? (d.localizacao || '') : '';
                document.getElementById('f-ip').value = d ? (d.ip || '') : '';
                document.getElementById('f-usuario').value = d ? (d.usuario || '') : '';
                document.getElementById('f-senha').value = d ? (d.senha || '') : '';
                document.getElementById('modal-title').textContent = d ? 'Editar Dispositivo' : 'Novo Dispositivo';
                document.getElementById('btn-salvar').textContent = d ? 'Atualizar' : 'Salvar';
                document.getElementById('modal').classList.add('open');
            }

            function fecharModal() { document.getElementById('modal').classList.remove('open'); }

            function editarDispositivo(id) {
                var d = dispositivos.find(function (x) { return x.id == id; });
                if (d) abrirModal(d);
            }

            async function salvar() {
                var id = document.getElementById('edit-id').value;
                var dados = {
                    tipo: document.getElementById('f-tipo').value,
                    nome: document.getElementById('f-nome').value.trim(),
                    localizacao: document.getElementById('f-local').value.trim(),
                    ip: document.getElementById('f-ip').value.trim(),
                    usuario: document.getElementById('f-usuario').value.trim(),
                    senha: document.getElementById('f-senha').value.trim(),
                };
                if (!dados.nome) return showToast('Nome obrigatório!', 'error');
                var btn = document.getElementById('btn-salvar');
                btn.disabled = true;
                var result = id
                    ? await client.from('dispositivos').update(dados).eq('id', id)
                    : await client.from('dispositivos').insert([dados]);
                btn.disabled = false;
                if (result.error) return showToast('Erro: ' + result.error.message, 'error');
                showToast(id ? 'Atualizado!' : 'Dispositivo adicionado!');
                fecharModal();
                carregarDispositivos();
            }

            async function excluir(id) {
                if (!confirm('Confirmar exclusão?')) return;
                var result = await client.from('dispositivos').delete().eq('id', id);
                if (result.error) return showToast('Erro ao excluir', 'error');
                showToast('Removido!');
                carregarDispositivos();
            }

            function showToast(msg, tipo) {
                var t = document.getElementById('toast');
                t.textContent = msg;
                t.style.color = tipo === 'error' ? 'var(--red)' : 'var(--green)';
                t.classList.add('show');
                setTimeout(function () { t.classList.remove('show'); }, 2500);
            }
        })();
    </script>
</body>

</html>
