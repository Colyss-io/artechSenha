<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Dispositivos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --surface2: #1e2334;
            --border: rgba(255, 255, 255, 0.08);
            --border-h: rgba(255, 255, 255, 0.18);
            --text: #e8eaf0;
            --muted: #7a8099;
            --accent: #4f8ef7;
            --adim: rgba(79, 142, 247, 0.12);
            --aborder: rgba(79, 142, 247, 0.35);
            --green: #34d399;
            --gdim: rgba(52, 211, 153, 0.1);
            --amber: #fbbf24;
            --adimb: rgba(251, 191, 36, 0.1);
            --red: #f87171;
            --rdim: rgba(248, 113, 113, 0.1);
            --r: 10px;
            --font: 'Sora', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--adim);
            border: 1px solid var(--aborder);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .badge {
            font-size: 11px;
            font-family: var(--mono);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .badge.off {
            background: var(--rdim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.25)
        }

        .badge.on {
            background: var(--gdim);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.25)
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor
        }

        .badge.on .dot {
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
            margin-bottom: 2rem
        }

        .panel-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 1rem
        }

        .cfg-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end
        }

        label {
            font-size: 12px;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
            font-family: var(--mono)
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px 12px;
            outline: none;
            transition: border-color .15s
        }

        input:focus,
        select:focus {
            border-color: var(--aborder)
        }

        input::placeholder {
            color: var(--muted)
        }

        button {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap
        }

        .bp {
            background: var(--accent);
            color: #fff
        }

        .bp:hover {
            opacity: .9
        }

        .bp:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .bg2 {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted)
        }

        .bg2:hover {
            border-color: var(--border-h);
            color: var(--text)
        }

        .bd {
            background: var(--rdim);
            border: 1px solid rgba(248, 113, 113, .2);
            color: var(--red);
            padding: 6px 12px;
            font-size: 12px
        }

        .bd:hover {
            background: rgba(248, 113, 113, .2)
        }

        .bsm {
            padding: 6px 10px;
            font-size: 12px
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            font-size: 13px;
            color: var(--muted)
        }

        .breadcrumb .sep {
            opacity: .4
        }

        .breadcrumb .link {
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 13px;
            padding: 0
        }

        .breadcrumb .link:hover {
            text-decoration: underline
        }

        .breadcrumb .cur {
            color: var(--text);
            font-weight: 500
        }

        /* Topo de seção */
        .sec-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem
        }

        .sec-title {
            font-size: 16px;
            font-weight: 600
        }

        .cnt {
            font-size: 12px;
            font-family: var(--mono);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px
        }

        /* Cards de condomínio */
        .condo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem
        }

        .condo-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.25rem;
            cursor: pointer;
            transition: all .15s;
            animation: fi .2s ease;
            position: relative
        }

        .condo-card:hover {
            border-color: var(--accent);
            background: var(--surface2)
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .condo-icon {
            font-size: 28px;
            margin-bottom: .75rem
        }

        .condo-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px
        }

        .condo-meta {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .condo-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity .15s
        }

        .condo-card:hover .condo-actions {
            opacity: 1
        }

        /* Filtros dispositivos */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 1.25rem;
            flex-wrap: wrap
        }

        .fbtn {
            font-size: 12px;
            font-family: var(--mono);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .15s
        }

        .fbtn:hover,
        .fbtn.active {
            border-color: var(--aborder);
            color: var(--accent);
            background: var(--adim)
        }

        .sbox {
            position: relative;
            flex: 1;
            min-width: 200px
        }

        .sbox input {
            padding-left: 36px
        }

        .sico {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none
        }

        /* Cards de dispositivo */
        .dev-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem
        }

        .dev-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.25rem;
            transition: border-color .15s;
            animation: fi .2s ease
        }

        .dev-card:hover {
            border-color: var(--border-h)
        }

        .card-hd {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 10px
        }

        .tbadge {
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 3px 8px;
            border-radius: 4px
        }

        .tdvr {
            background: var(--adim);
            color: var(--accent);
            border: 1px solid var(--aborder)
        }

        .tfacial {
            background: var(--adimb);
            color: var(--amber);
            border: 1px solid rgba(251, 191, 36, .25)
        }

        .dname {
            font-size: 15px;
            font-weight: 600;
            margin: 8px 0 3px
        }

        .dloc {
            font-size: 12px;
            color: var(--muted)
        }

        .cactions {
            display: flex;
            gap: 6px
        }

        .igrid {
            display: grid;
            gap: 8px
        }

        .irow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 12px
        }

        .ilabel {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .ival {
            font-size: 13px;
            font-family: var(--mono);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .icopy,
        .ieye {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 13px;
            border-radius: 4px;
            transition: color .1s
        }

        .icopy:hover {
            color: var(--accent)
        }

        .ieye:hover {
            color: var(--text)
        }

        /* Modal */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem
        }

        .overlay.open {
            display: flex
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            width: 100%;
            max-width: 480px;
            animation: su .2s ease
        }

        @keyframes su {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .mtitle {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 1.5rem
        }

        .frow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .fg {
            margin-bottom: 14px
        }

        .fg.full {
            grid-column: 1/-1
        }

        .mactions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 1.5rem
        }

        .empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted)
        }

        .empty .ico {
            font-size: 40px;
            margin-bottom: 1rem;
            opacity: .4
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 13px;
            font-family: var(--mono);
            z-index: 999;
            pointer-events: none
        }

        @media(max-width:640px) {
            main {
                padding: 1rem
            }

            .cfg-row {
                grid-template-columns: 1fr
            }

            .condo-grid,
            .dev-grid {
                grid-template-columns: 1fr
            }

            .frow {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        import { createElement as h, useState, useCallback } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';

        function App() {
            const [sbUrl, setSbUrl] = useState('');
            const [sbKey, setSbKey] = useState('');
            const [client, setClient] = useState(null);
            const [conectando, setConectando] = useState(false);

            // Navegação: null = lista condominios, objeto = dentro do condominio
            const [condoAtual, setCondoAtual] = useState(null);

            const [condominios, setCondominios] = useState([]);
            const [dispositivos, setDispositivos] = useState([]);
            const [filtro, setFiltro] = useState('todos');
            const [busca, setBusca] = useState('');
            const [senhasVisiveis, setSenhasVisiveis] = useState({});

            // Modal: null | 'novo-condo' | 'edit-condo' | 'novo-dev' | objeto-dev
            const [modal, setModal] = useState(null);
            const [formCondo, setFormCondo] = useState({ nome: '' });
            const [formDev, setFormDev] = useState({ tipo: 'DVR', nome: '', localizacao: '', ip: '', usuario: '', senha: '' });
            const [salvando, setSalvando] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (msg, tipo = 'ok') => {
                setToast({ msg, tipo });
                setTimeout(() => setToast(null), 2500);
            };

            const carregarCondominios = async (c) => {
                const cl = c || client;
                const { data, error } = await cl.from('condominios').select('id, nome, created_at').order('nome');
                if (error) { showToast('Erro: ' + error.message, 'erro'); return; }
                // contar dispositivos por condomínio
                const { data: devs } = await cl.from('dispositivos').select('condominio_id');
                const counts = {};
                (devs || []).forEach(d => { counts[d.condominio_id] = (counts[d.condominio_id] || 0) + 1; });
                setCondominios((data || []).map(c => ({ ...c, total: counts[c.id] || 0 })));
            };

            const carregarDispositivos = async (condoId, cl) => {
                const c = cl || client;
                const { data, error } = await c.from('dispositivos').select('*').eq('condominio_id', condoId).order('created_at', { ascending: false });
                if (error) { showToast('Erro: ' + error.message, 'erro'); return; }
                setDispositivos(data || []);
            };

            const conectar = async () => {
                if (!sbUrl || !sbKey) return showToast('Preencha URL e Anon Key!', 'erro');
                setConectando(true);
                const c = createClient(sbUrl.trim(), sbKey.trim());
                const { error } = await c.from('condominios').select('id').limit(1);
                setConectando(false);
                if (error) { showToast('Falha: ' + error.message, 'erro'); return; }
                setClient(c);
                carregarCondominios(c);
            };

            const entrarCondo = async (condo) => {
                setCondoAtual(condo);
                setBusca('');
                setFiltro('todos');
                await carregarDispositivos(condo.id);
            };

            const voltarLista = () => {
                setCondoAtual(null);
                setDispositivos([]);
                carregarCondominios();
            };

            // ---- CONDOMÍNIO ----
            const abrirNovoCondo = () => { setFormCondo({ nome: '' }); setModal('novo-condo'); };
            const abrirEditCondo = (e, condo) => { e.stopPropagation(); setFormCondo({ nome: condo.nome, id: condo.id }); setModal('edit-condo'); };

            const salvarCondo = async () => {
                if (!formCondo.nome.trim()) return showToast('Nome obrigatório!', 'erro');
                setSalvando(true);
                const { error } = formCondo.id
                    ? await client.from('condominios').update({ nome: formCondo.nome.trim() }).eq('id', formCondo.id)
                    : await client.from('condominios').insert([{ nome: formCondo.nome.trim() }]);
                setSalvando(false);
                if (error) return showToast('Erro: ' + error.message, 'erro');
                showToast(formCondo.id ? 'Condomínio atualizado!' : 'Condomínio criado!');
                setModal(null);
                carregarCondominios();
            };

            const excluirCondo = async (e, id) => {
                e.stopPropagation();
                if (!confirm('Excluir condomínio e todos os seus dispositivos?')) return;
                const { error } = await client.from('condominios').delete().eq('id', id);
                if (error) return showToast('Erro ao excluir', 'erro');
                showToast('Condomínio removido!');
                carregarCondominios();
            };

            // ---- DISPOSITIVOS ----
            const abrirNovoDev = () => { setFormDev({ tipo: 'DVR', nome: '', localizacao: '', ip: '', usuario: '', senha: '' }); setModal('novo-dev'); };
            const abrirEditDev = (d) => { setFormDev({ tipo: d.tipo, nome: d.nome, localizacao: d.localizacao || '', ip: d.ip || '', usuario: d.usuario || '', senha: d.senha || '', id: d.id }); setModal('edit-dev'); };

            const salvarDev = async () => {
                if (!formDev.nome.trim()) return showToast('Nome obrigatório!', 'erro');
                setSalvando(true);
                const dados = { tipo: formDev.tipo, nome: formDev.nome.trim(), localizacao: formDev.localizacao.trim(), ip: formDev.ip.trim(), usuario: formDev.usuario.trim(), senha: formDev.senha.trim(), condominio_id: condoAtual.id };
                const { error } = formDev.id
                    ? await client.from('dispositivos').update(dados).eq('id', formDev.id)
                    : await client.from('dispositivos').insert([dados]);
                setSalvando(false);
                if (error) return showToast('Erro: ' + error.message, 'erro');
                showToast(formDev.id ? 'Atualizado!' : 'Adicionado!');
                setModal(null);
                carregarDispositivos(condoAtual.id);
            };

            const excluirDev = async (id) => {
                if (!confirm('Confirmar exclusão?')) return;
                const { error } = await client.from('dispositivos').delete().eq('id', id);
                if (error) return showToast('Erro ao excluir', 'erro');
                showToast('Removido!');
                carregarDispositivos(condoAtual.id);
            };

            const toggleSenha = (id) => setSenhasVisiveis(p => ({ ...p, [id]: !p[id] }));
            const copiar = (txt) => navigator.clipboard.writeText(txt).then(() => showToast('Copiado!'));
            const upDev = (k) => (e) => setFormDev(f => ({ ...f, [k]: e.target.value }));

            const filtrados = dispositivos.filter(d => {
                const mt = filtro === 'todos' || d.tipo === filtro;
                const mb = !busca || (d.nome || '').toLowerCase().includes(busca.toLowerCase()) || (d.localizacao || '').toLowerCase().includes(busca.toLowerCase()) || (d.ip || '').includes(busca);
                return mt && mb;
            });

            const modalAberto = modal !== null;

            return h('div', null,
                h('header', null,
                    h('div', { className: 'logo' },
                        h('div', { className: 'logo-icon' }, '🔐'),
                        'Gerenciador de Dispositivos'
                    ),
                    h('div', { className: 'badge ' + (client ? 'on' : 'off') },
                        h('div', { className: 'dot' }),
                        client ? 'Conectado' : 'Desconectado'
                    )
                ),

                h('main', null,

                    // Config
                    !client && h('div', { className: 'panel' },
                        h('div', { className: 'panel-title' }, 'Configuração do Supabase'),
                        h('div', { className: 'cfg-row' },
                            h('div', null,
                                h('label', null, 'SUPABASE URL'),
                                h('input', { type: 'text', placeholder: 'https://xxxx.supabase.co', value: sbUrl, onChange: e => setSbUrl(e.target.value) })
                            ),
                            h('div', null,
                                h('label', null, 'ANON KEY'),
                                h('input', { type: 'password', placeholder: 'eyJhbGci...', value: sbKey, onChange: e => setSbKey(e.target.value) })
                            ),
                            h('button', { className: 'bp', onClick: conectar, disabled: conectando }, conectando ? 'Conectando...' : 'Conectar')
                        )
                    ),

                    // Lista de Condomínios
                    client && !condoAtual && h('div', null,
                        h('div', { className: 'sec-hd' },
                            h('div', { style: { display: 'flex', alignItems: 'center' } },
                                h('span', { className: 'sec-title' }, 'Condomínios'),
                                h('span', { className: 'cnt' }, condominios.length)
                            ),
                            h('button', { className: 'bp', onClick: abrirNovoCondo }, '+ Novo Condomínio')
                        ),
                        condominios.length === 0
                            ? h('div', { className: 'empty' }, h('div', { className: 'ico' }, '🏢'), h('p', null, 'Nenhum condomínio cadastrado. Crie o primeiro!'))
                            : h('div', { className: 'condo-grid' },
                                condominios.map(condo =>
                                    h('div', { key: condo.id, className: 'condo-card', onClick: () => entrarCondo(condo) },
                                        h('div', { className: 'condo-actions' },
                                            h('button', { className: 'bg2 bsm', onClick: e => abrirEditCondo(e, condo) }, '✏'),
                                            h('button', { className: 'bd', onClick: e => excluirCondo(e, condo.id) }, '🗑')
                                        ),
                                        h('div', { className: 'condo-icon' }, '🏢'),
                                        h('div', { className: 'condo-name' }, condo.nome),
                                        h('div', { className: 'condo-meta' }, condo.total + ' dispositivo' + (condo.total !== 1 ? 's' : ''))
                                    )
                                )
                            )
                    ),

                    // Dentro de um Condomínio
                    client && condoAtual && h('div', null,
                        h('div', { className: 'breadcrumb' },
                            h('button', { className: 'link', onClick: voltarLista }, 'Condomínios'),
                            h('span', { className: 'sep' }, '›'),
                            h('span', { className: 'cur' }, condoAtual.nome)
                        ),
                        h('div', { className: 'sec-hd' },
                            h('div', { style: { display: 'flex', alignItems: 'center' } },
                                h('span', { className: 'sec-title' }, condoAtual.nome),
                                h('span', { className: 'cnt' }, filtrados.length)
                            ),
                            h('button', { className: 'bp', onClick: abrirNovoDev }, '+ Novo Dispositivo')
                        ),
                        h('div', { className: 'filters' },
                            h('div', { className: 'sbox' },
                                h('span', { className: 'sico' }, '🔍'),
                                h('input', { type: 'text', placeholder: 'Buscar...', value: busca, onChange: e => setBusca(e.target.value) })
                            ),
                            ['todos', 'DVR', 'Leitor Facial'].map(f =>
                                h('button', { key: f, className: 'fbtn' + (filtro === f ? ' active' : ''), onClick: () => setFiltro(f) }, f === 'todos' ? 'Todos' : f)
                            )
                        ),
                        filtrados.length === 0
                            ? h('div', { className: 'empty' }, h('div', { className: 'ico' }, '📭'), h('p', null, 'Nenhum dispositivo neste condomínio.'))
                            : h('div', { className: 'dev-grid' },
                                filtrados.map(d =>
                                    h('div', { key: d.id, className: 'dev-card' },
                                        h('div', { className: 'card-hd' },
                                            h('div', null,
                                                h('span', { className: 'tbadge ' + (d.tipo === 'DVR' ? 'tdvr' : 'tfacial') }, d.tipo),
                                                h('div', { className: 'dname' }, d.nome),
                                                h('div', { className: 'dloc' }, '📍 ' + (d.localizacao || '—'))
                                            ),
                                            h('div', { className: 'cactions' },
                                                h('button', { className: 'bg2 bsm', onClick: () => abrirEditDev(d) }, '✏'),
                                                h('button', { className: 'bd', onClick: () => excluirDev(d.id) }, '🗑')
                                            )
                                        ),
                                        h('div', { className: 'igrid' },
                                            h('div', { className: 'irow' },
                                                h('span', { className: 'ilabel' }, 'IP'),
                                                h('span', { className: 'ival' }, d.ip || '—', d.ip && h('button', { className: 'icopy', onClick: () => copiar(d.ip) }, '⎘'))
                                            ),
                                            h('div', { className: 'irow' },
                                                h('span', { className: 'ilabel' }, 'Usuário'),
                                                h('span', { className: 'ival' }, d.usuario || '—', d.usuario && h('button', { className: 'icopy', onClick: () => copiar(d.usuario) }, '⎘'))
                                            ),
                                            h('div', { className: 'irow' },
                                                h('span', { className: 'ilabel' }, 'Senha'),
                                                h('span', { className: 'ival' },
                                                    senhasVisiveis[d.id] ? (d.senha || '—') : '••••••••',
                                                    h('button', { className: 'ieye', onClick: () => toggleSenha(d.id) }, senhasVisiveis[d.id] ? '🙈' : '👁'),
                                                    d.senha && h('button', { className: 'icopy', onClick: () => copiar(d.senha) }, '⎘')
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                    )
                ),

                // Modal Condomínio
                h('div', { className: 'overlay' + ((modal === 'novo-condo' || modal === 'edit-condo') ? ' open' : ''), onClick: e => { if (e.target.className.includes('overlay')) setModal(null) } },
                    h('div', { className: 'modal' },
                        h('div', { className: 'mtitle' }, modal === 'edit-condo' ? 'Editar Condomínio' : 'Novo Condomínio'),
                        h('div', { className: 'fg' },
                            h('label', null, 'Nome do Condomínio'),
                            h('input', {
                                type: 'text', placeholder: 'Ex: Residencial das Flores', value: formCondo.nome, onChange: e => setFormCondo(f => ({ ...f, nome: e.target.value })),
                                onKeyDown: e => { if (e.key === 'Enter') salvarCondo() }
                            })
                        ),
                        h('div', { className: 'mactions' },
                            h('button', { className: 'bg2', onClick: () => setModal(null) }, 'Cancelar'),
                            h('button', { className: 'bp', onClick: salvarCondo, disabled: salvando }, salvando ? 'Salvando...' : 'Salvar')
                        )
                    )
                ),

                // Modal Dispositivo
                h('div', { className: 'overlay' + ((modal === 'novo-dev' || modal === 'edit-dev') ? ' open' : ''), onClick: e => { if (e.target.className.includes('overlay')) setModal(null) } },
                    h('div', { className: 'modal' },
                        h('div', { className: 'mtitle' }, modal === 'edit-dev' ? 'Editar Dispositivo' : 'Novo Dispositivo'),
                        h('div', { className: 'frow' },
                            h('div', { className: 'fg' }, h('label', null, 'Tipo'), h('select', { value: formDev.tipo, onChange: upDev('tipo') }, h('option', { value: 'DVR' }, 'DVR'), h('option', { value: 'Leitor Facial' }, 'Leitor Facial'))),
                            h('div', { className: 'fg' }, h('label', null, 'Nome'), h('input', { type: 'text', placeholder: 'Ex: DVR Entrada', value: formDev.nome, onChange: upDev('nome') })),
                            h('div', { className: 'fg full' }, h('label', null, 'Localização'), h('input', { type: 'text', placeholder: 'Ex: Portaria, Salão...', value: formDev.localizacao, onChange: upDev('localizacao') })),
                            h('div', { className: 'fg' }, h('label', null, 'IP'), h('input', { type: 'text', placeholder: '192.168.1.100', value: formDev.ip, onChange: upDev('ip') })),
                            h('div', { className: 'fg' }, h('label', null, 'Usuário'), h('input', { type: 'text', placeholder: 'admin', value: formDev.usuario, onChange: upDev('usuario') })),
                            h('div', { className: 'fg full' }, h('label', null, 'Senha'), h('input', { type: 'text', value: formDev.senha, onChange: upDev('senha') }))
                        ),
                        h('div', { className: 'mactions' },
                            h('button', { className: 'bg2', onClick: () => setModal(null) }, 'Cancelar'),
                            h('button', { className: 'bp', onClick: salvarDev, disabled: salvando }, salvando ? 'Salvando...' : 'Salvar')
                        )
                    )
                ),

                toast && h('div', { className: 'toast', style: { color: toast.tipo === 'erro' ? 'var(--red)' : 'var(--green)' } }, toast.msg)
            );
        }

        createRoot(document.getElementById('app')).render(h(App));
    </script>
</body>

</html>
